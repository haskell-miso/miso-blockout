    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> miso-blockout </title>
    <style>
      @media (max-width: 820px) {
        .blockout { max-width: 100vw; padding: 0 4px; box-sizing: border-box; }
        .layout { flex-direction: column !important; align-items: center; }
        .pit-col { width: 100%; }
        .pit { width: 100% !important; max-width: 100%; height: auto !important; }
        .panel { flex-direction: row !important; width: 100% !important; flex-wrap: wrap; gap: 6px !important; }
        .panel.wide { width: 100% !important; }
        .stack { display: none !important; }
        .infobox { flex: 1; min-width: 80px; }
        .mobile-controls { display: flex !important; flex-direction: column; padding: 8px 0; }
        .controls { max-width: 100vw !important; font-size: 12px !important; }
      }
    </style>
